<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f093fb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f5576c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4facfe;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00f2fe;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="400" height="400" rx="40" fill="#1a1a2e"/>
  
  <!-- Grid pattern -->
  <g opacity="0.1">
    <path d="M50 50 L350 50 M50 100 L350 100 M50 150 L350 150 M50 200 L350 200 M50 250 L350 250 M50 300 L350 300 M50 350 L350 350" stroke="#fff" stroke-width="1"/>
    <path d="M50 50 L50 350 M100 50 L100 350 M150 50 L150 350 M200 50 L200 350 M250 50 L250 350 M300 50 L300 350 M350 50 L350 350" stroke="#fff" stroke-width="1"/>
  </g>
  
  <!-- Lowcode building blocks -->
  <g transform="translate(100, 100)">
    <!-- Block 1 - Top Left -->
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#grad1)" opacity="0.9">
      <animate attributeName="y" values="0;-5;0" dur="3s" repeatCount="indefinite"/>
    </rect>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">UI</text>
  </g>
  
  <g transform="translate(220, 100)">
    <!-- Block 2 - Top Right -->
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#grad2)" opacity="0.9">
      <animate attributeName="y" values="0;-5;0" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </rect>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Logic</text>
  </g>
  
  <g transform="translate(160, 200)">
    <!-- Block 3 - Bottom Center -->
    <rect x="0" y="0" width="80" height="80" rx="8" fill="url(#grad3)" opacity="0.9">
      <animate attributeName="y" values="0;-5;0" dur="3s" repeatCount="indefinite" begin="1s"/>
    </rect>
    <text x="40" y="45" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white" text-anchor="middle">Data</text>
  </g>
  
  <!-- Connection lines -->
  <path d="M140 180 L180 200" stroke="#667eea" stroke-width="3" fill="none" opacity="0.6">
    <animate attributeName="stroke-dasharray" values="0,10;5,5" dur="2s" repeatCount="indefinite"/>
  </path>
  <path d="M260 180 L220 200" stroke="#f093fb" stroke-width="3" fill="none" opacity="0.6">
    <animate attributeName="stroke-dasharray" values="0,10;5,5" dur="2s" repeatCount="indefinite"/>
  </path>
  
  <!-- Title text -->
  <text x="200" y="330" font-family="Arial, sans-serif" font-size="28" font-weight="bold" fill="white" text-anchor="middle" letter-spacing="2">LOWCODE</text>
  <text x="200" y="355" font-family="Arial, sans-serif" font-size="16" fill="#aaa" text-anchor="middle" letter-spacing="1">ENGINE</text>
  
  <!-- Decorative elements -->
  <circle cx="80" cy="320" r="4" fill="#667eea" opacity="0.6"/>
  <circle cx="320" cy="320" r="4" fill="#f093fb" opacity="0.6"/>
  <circle cx="320" cy="80" r="4" fill="#4facfe" opacity="0.6"/>
  <circle cx="80" cy="80" r="4" fill="#f5576c" opacity="0.6"/>
</svg>